<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>슥균맨 확률 및 룰</title>
  <style>
    body {
      font-family: "Nanum Gothic", Arial, sans-serif;
      color: #f8f9fa;
      background-color: #212529;
      text-align: center;
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 20px;
      min-height: 100vh;
      line-height: 1.6;
      letter-spacing: 0.5px;
      box-sizing: border-box;
    }

    h2 {
      color: #f8f9fa;
      margin-bottom: 20px;
      font-weight: 700;
    }

    #leftContainer,
    #rightContainer {
      display: flex;
      flex-direction: column;
      width: 400px;
      margin: 0;
    }

    #leftPanel,
    #rightPanel {
      background-color: #343a40;
      padding: 20px;
      border-radius: 10px;
      height: 860px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
      text-align: left;
      overflow: auto;
      position: relative;
      box-sizing: border-box;
    }

    ul {
      margin: 0;
      padding-left: 0;
      list-style: none;
    }

    #happyList {
      padding-bottom: 60px;
    }

    #starCatchButton,
    #gangwonButton {
      position: absolute;
      right: 20px;
      bottom: 20px;
      background-color: #ffffff;
      color: #000000;
      border: none;
      border-radius: 5px;
      padding: 10px 16px;
      font-size: 15px;
      cursor: pointer;
      transition: background-color 0.3s, transform 0.2s;
    }

    #starCatchButton:hover,
    #gangwonButton:hover {
      background-color: #e0a800;
      transform: scale(1.05);
    }

    #starCatchButton:active,
    #gangwonButton:active {
      background-color: #c69500;
    }

    .starcatch-image {
      display: block;
      width: 100%;
      max-width: 620px;
      margin: 0 auto 18px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      background-color: #343a40;
    }

    .starcatch-info {
      margin: 0;
      padding: 0;
      color: #f8f9fa;
      text-align: center;
      font-size: 16px;
      line-height: 1.8;
    }

    .starcatch-info strong {
      color: #ffffff;
      font-size: 18px;
    }

    li {
      margin-bottom: 8px;
      margin-left: 10px;
      color: #f8f9fa;
      white-space: pre-wrap;
    }


    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.8);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      position: relative;
      background-color: #545d66;
      border: 1px solid #adb5bd;
      border-radius: 10px;
      padding: 20px;
      width: 700px;
      max-width: 90vw;
      max-height: 80vh;
      color: #f8f9fa;
      text-align: left;
      overflow: auto;
      box-sizing: border-box;
    }

    .modal-content h2 {
      text-align: center;
      margin-top: 0;
      margin-bottom: 20px;
    }

    .close {
      color: #aaa;
      font-size: 28px;
      font-weight: bold;
      position: absolute;
      top: 10px;
      right: 15px;
      cursor: pointer;
    }

    .close:hover,
    .close:focus {
      color: #000;
    }

    #gangwonList li {
      margin-bottom: 10px;
      margin-left: 10px;
    }

    @media (max-width: 1100px) {
      body {
        flex-direction: column;
        align-items: center;
      }

      #leftContainer,
      #rightContainer {
        width: min(90vw, 700px);
      }

      #leftPanel,
      #rightPanel {
        height: auto;
        min-height: 400px;
      }
    }
  </style>
</head>
<body>
  <div id="leftContainer">
    <div id="leftPanel">
      <h2>행복띠 확률</h2>
      <ul id="happyList"></ul>
      <button id="starCatchButton" onclick="openStarCatchModal()">스타캐치</button>
    </div>
  </div>

  <div id="rightContainer">
    <div id="rightPanel">
      <h2>듀얼 컨텐츠 룰</h2>
      <ul id="ruleList"></ul>
      <button id="gangwonButton" onclick="openGangwonModal()">강원랜디</button>
    </div>
  </div>

  <div id="starCatchModal" class="modal" onclick="closeStarCatchModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
